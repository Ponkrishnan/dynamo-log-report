artifacts = ["/app/report.json"]

[task]
name = "dynamo/log-report"
description = "Parse an Apache-style access log into a small JSON summary report."

[verifier]
timeout_sec = 120

[metadata]
category = "data_processing_and_etl"
subcategory = "text_processing"
task_objective = "transform"
artifact_type = "generated_output_artifact"
expert_time_estimate_hours = 0.3
model_tested = "claude-sonnet-4-6"
agent_tested = "default"
difficulty_explanation = "Parse a small Apache access log and emit summary stats as JSON."
solution_explanation = "Read the log line by line, count total requests, collect unique IPs, tally path frequencies, write JSON with total_requests, unique_ips, and top_path."
verification_explanation = "Load /app/report.json and assert total_requests==6, unique_ips==3, top_path=='/index.html'."

[environment]
allow_internet = false
mcp_servers = []
